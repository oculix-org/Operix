name: Release Python (PyPI)

# Manual trigger only.
# Setup options (pick one):
#   A) PyPI Trusted Publisher (recommended): no secret, OIDC. Configure on PyPI:
#      https://pypi.org/manage/account/publishing/
#   B) PyPI API token: add the PYPI_API_TOKEN repo secret and uncomment the
#      `password:` line at the bottom of this workflow.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Package version (X.Y.Z). Must match python/pyproject.toml.'
        required: true
        type: string

permissions:
  contents: write   # create the git tag at the end
  id-token: write   # OIDC for PyPI Trusted Publisher

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      - name: Verify pyproject.toml version matches the input
        working-directory: python
        run: |
          ACTUAL="$(grep -E '^version\s*=' pyproject.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')"
          if [ "${{ inputs.version }}" != "$ACTUAL" ]; then
            echo "::error::pyproject.toml version ($ACTUAL) != input (${{ inputs.version }})"
            exit 1
          fi

      - name: Build sdist + wheel
        working-directory: python
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: python/dist
          # password: ${{ secrets.PYPI_API_TOKEN }}   # uncomment for API-token mode

      - name: Create git tag
        run: |
          git tag python-v${{ inputs.version }}
          git push origin python-v${{ inputs.version }}
