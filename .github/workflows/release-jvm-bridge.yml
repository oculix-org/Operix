name: Release jvm-bridge

# Reusable workflow — called only by release.yml (the orchestrator), never
# dispatched on its own. The version is read straight from jvm-bridge/pom.xml.
# Before releasing, bump the version constants so they all match
# jvm-bridge/pom.xml:<version>:
#   - python/src/oculix/_bridge.py:BRIDGE_VERSION
#   - nodejs/src/bridge.ts:BRIDGE_VERSION
#   - dotnet/src/OculiX/Bridge.cs:BridgeVersion

on:
  workflow_call:

permissions:
  contents: write   # create the GitHub Release + tag

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Read bridge version from pom.xml
        id: pom
        working-directory: jvm-bridge
        run: |
          VERSION="$(mvn -B -q help:evaluate -Dexpression=project.version -DforceStdout)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Bridge version: $VERSION"

      - name: Test
        working-directory: jvm-bridge
        run: mvn -B test

      - name: Package
        working-directory: jvm-bridge
        # pom.xml <finalName> is operix-jvm-bridge-${project.version}, so package
        # already emits target/operix-jvm-bridge-<version>.jar — no rename needed.
        run: mvn -B package -DskipTests

      - name: Create GitHub Release with the fat JAR attached
        uses: softprops/action-gh-release@v2
        with:
          tag_name: jvm-bridge-${{ steps.pom.outputs.version }}
          name: jvm-bridge ${{ steps.pom.outputs.version }}
          body: |
            OculiX JVM bridge (fat JAR) for the Python / Node.js / .NET wrappers.

            Includes oculixapi + Apertix OpenCV + JSON-RPC server.
            Wrappers download this artifact on first use.
          files: jvm-bridge/target/operix-jvm-bridge-${{ steps.pom.outputs.version }}.jar
