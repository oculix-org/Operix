name: Release jvm-bridge

# Manual trigger only. Provide the version, must match jvm-bridge/pom.xml.
# Bump the BridgeVersion constants in:
#   - jvm-bridge/pom.xml:<version>
#   - python/src/oculix/_bridge.py:BRIDGE_VERSION
#   - nodejs/src/bridge.ts:BRIDGE_VERSION
#   - dotnet/src/OculiX/Bridge.cs:BridgeVersion
# before triggering this workflow.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Bridge version (X.Y.Z, no v prefix). Must match pom.xml.'
        required: true
        type: string

permissions:
  contents: write   # create the GitHub Release + tag

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Verify pom.xml version matches the input
        working-directory: jvm-bridge
        run: |
          POM_VERSION="$(mvn -B -q help:evaluate -Dexpression=project.version -DforceStdout)"
          if [ "$POM_VERSION" != "${{ inputs.version }}" ]; then
            echo "::error::pom.xml version ($POM_VERSION) does not match input (${{ inputs.version }})"
            exit 1
          fi

      - name: Test
        working-directory: jvm-bridge
        run: mvn -B test

      - name: Package
        working-directory: jvm-bridge
        run: mvn -B package -DskipTests

      - name: Rename artifact with version suffix
        run: |
          mv jvm-bridge/target/operix-jvm-bridge.jar \
             jvm-bridge/target/operix-jvm-bridge-${{ inputs.version }}.jar

      - name: Create GitHub Release with the fat JAR attached
        uses: softprops/action-gh-release@v2
        with:
          tag_name: jvm-bridge-v${{ inputs.version }}
          name: jvm-bridge ${{ inputs.version }}
          body: |
            OculiX JVM bridge (fat JAR) for the Python / Node.js / .NET wrappers.

            Includes oculixapi + Apertix OpenCV + JSON-RPC server.
            Wrappers download this artifact on first use.
          files: jvm-bridge/target/operix-jvm-bridge-${{ inputs.version }}.jar
